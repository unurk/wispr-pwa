<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Wispr" />
  <meta name="theme-color" content="#0f0f0f" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Wispr</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f0f;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: env(safe-area-inset-top, 48px) 24px env(safe-area-inset-bottom, 24px);
      padding-top: max(env(safe-area-inset-top), 48px);
    }

    h1 { font-size: 32px; font-weight: 700; letter-spacing: -1px; margin-bottom: 6px; }
    .subtitle { font-size: 14px; color: #666; margin-bottom: 28px; text-align: center; }

    #resultBox {
      width: 100%;
      min-height: 110px;
      background: #1a1a1a;
      color: #fff;
      border: 2px solid transparent;
      border-radius: 16px;
      padding: 16px;
      font-size: 17px;
      line-height: 1.55;
      font-family: inherit;
      resize: none;
      margin-bottom: 10px;
      -webkit-user-select: text;
      user-select: text;
      transition: border-color 0.2s;
    }
    #resultBox:focus { outline: none; border-color: #6366f1; }
    #resultBox.listening { border-color: #ef4444; }
    #resultBox.loading   { border-color: #f59e0b; }

    #copyBtn {
      width: 100%;
      padding: 15px;
      border-radius: 14px;
      border: none;
      background: #6366f1;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 10px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.2s, transform 0.1s;
      display: none;
    }
    #copyBtn:active { transform: scale(0.97); }
    #copyBtn.done   { background: #16a34a; }

    #status {
      font-size: 13px;
      color: #666;
      min-height: 20px;
      margin-bottom: 8px;
      text-align: center;
    }
    #status.ok    { color: #4ade80; font-weight: 600; }
    #status.error { color: #f87171; }
    #status.info  { color: #f59e0b; }

    /* Timer während der Aufnahme */
    #timer {
      font-size: 28px;
      font-weight: 700;
      color: #ef4444;
      letter-spacing: 2px;
      min-height: 40px;
      display: none;
      margin-bottom: 4px;
    }

    .mic-wrap {
      position: relative;
      width: 120px; height: 120px;
      display: flex; align-items: center; justify-content: center;
      margin: 16px 0 12px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .mic-ring {
      position: absolute;
      width: 120px; height: 120px;
      border-radius: 50%;
      background: #ef4444;
      opacity: 0;
    }
    .mic-wrap.rec .mic-ring {
      opacity: 0.25;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.25); }
    }
    .mic-btn {
      width: 88px; height: 88px;
      border-radius: 50%;
      background: #6366f1;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      box-shadow: 0 8px 32px rgba(99,102,241,.45);
      transition: background .15s, box-shadow .15s;
      z-index: 1;
    }
    .mic-wrap.rec .mic-btn {
      background: #ef4444;
      box-shadow: 0 8px 32px rgba(239,68,68,.45);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .mic-wrap.loading .mic-btn {
      background: #f59e0b;
      box-shadow: 0 8px 32px rgba(245,158,11,.45);
      animation: none;
    }

    .hint { color: #555; font-size: 13px; text-align: center; margin-bottom: 24px; }

    #history { width: 100%; flex: 1; overflow: hidden; display: none; flex-direction: column; }
    .hist-title { color: #888; font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
    .hist-list { overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .hist-item {
      background: #1a1a1a; border-radius: 12px; padding: 12px 14px;
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      cursor: pointer; border: none; width: 100%; text-align: left; color: inherit;
      -webkit-tap-highlight-color: transparent;
    }
    .hist-item span { color: #ccc; font-size: 14px; flex: 1; overflow: hidden;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .hist-item em { font-style: normal; color: #6366f1; font-size: 12px; font-weight: 600; white-space: nowrap; }
  </style>
</head>
<body>
  <h1>Wispr</h1>
  <p class="subtitle">Halte den Button gedrückt und sprich</p>
  <p style="color:#333;font-size:11px;margin-top:-22px;margin-bottom:22px">v10</p>

  <textarea id="resultBox" placeholder="Dein Text erscheint hier..." readonly></textarea>
  <button id="copyBtn">📋 Text kopieren</button>
  <p id="status"></p>
  <div id="timer">0:00</div>

  <div class="mic-wrap" id="micWrap">
    <div class="mic-ring"></div>
    <div class="mic-btn" id="micBtn">🎤</div>
  </div>
  <p class="hint" id="hint">Gedrückt halten zum Aufnehmen</p>

  <div id="history">
    <p class="hist-title">Verlauf</p>
    <div class="hist-list" id="histList"></div>
  </div>

  <script>
    const micWrap   = document.getElementById('micWrap');
    const micBtn    = document.getElementById('micBtn');
    const hint      = document.getElementById('hint');
    const resultBox = document.getElementById('resultBox');
    const copyBtn   = document.getElementById('copyBtn');
    const statusEl  = document.getElementById('status');
    const timerEl   = document.getElementById('timer');
    const histEl    = document.getElementById('history');
    const histList  = document.getElementById('histList');

    let mediaRecorder = null;
    let audioChunks   = [];
    let isRecording   = false;
    let isLoading     = false;
    let timerInterval = null;
    let timerSecs     = 0;
    const history     = [];

    // ─── Status ─────────────────────────────────────────────────────────────
    function setStatus(msg, cls) {
      statusEl.textContent = msg;
      statusEl.className = cls || '';
    }

    // ─── Timer ──────────────────────────────────────────────────────────────
    function startTimer() {
      timerSecs = 0;
      timerEl.style.display = 'block';
      timerEl.textContent = '0:00';
      timerInterval = setInterval(() => {
        timerSecs++;
        const m = Math.floor(timerSecs / 60);
        const s = String(timerSecs % 60).padStart(2, '0');
        timerEl.textContent = `${m}:${s}`;
      }, 1000);
    }

    function stopTimer() {
      clearInterval(timerInterval);
      timerEl.style.display = 'none';
    }

    // ─── Kopieren ───────────────────────────────────────────────────────────
    function doCopy(text) {
      if (!text) return;
      resultBox.value = text;
      resultBox.removeAttribute('readonly');
      resultBox.focus();
      resultBox.setSelectionRange(0, text.length);
      let ok = false;
      try { ok = document.execCommand('copy'); } catch {}
      resultBox.setAttribute('readonly', '');
      if (ok) {
        setStatus('✓ Kopiert! Jetzt in WhatsApp einfügen', 'ok');
        copyBtn.textContent = '✓ Kopiert';
        copyBtn.classList.add('done');
        setTimeout(() => { copyBtn.textContent = '📋 Text kopieren'; copyBtn.classList.remove('done'); }, 3000);
        setTimeout(() => setStatus(''), 4000);
      } else {
        setStatus('Tippe ins Textfeld → "Alles auswählen" → "Kopieren"', 'error');
      }
    }

    // ─── Verlauf ────────────────────────────────────────────────────────────
    function addHistory(text) {
      history.unshift(text);
      if (history.length > 10) history.pop();
      histList.innerHTML = '';
      history.forEach(item => {
        const b = document.createElement('button');
        b.className = 'hist-item';
        b.innerHTML = `<span>${item}</span><em>Kopieren</em>`;
        b.addEventListener('click', () => doCopy(item));
        histList.appendChild(b);
      });
      histEl.style.display = 'flex';
    }

    // ─── Aufnahme starten ───────────────────────────────────────────────────
    async function startRec() {
      if (isRecording || isLoading) return;

      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch (e) {
        setStatus('Mikrofon-Zugriff verweigert. Bitte in Safari-Einstellungen erlauben.', 'error');
        return;
      }

      audioChunks = [];
      const mimeType = MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4'
                     : MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm'
                     : '';
      mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
      mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
      // WICHTIG: ohne Timeslice → iOS finalisiert die Datei sauber (gültige Header)
      mediaRecorder.start();

      isRecording = true;
      resultBox.value = '';
      resultBox.placeholder = 'Aufnahme läuft...';
      resultBox.classList.add('listening');
      copyBtn.style.display = 'none';
      micWrap.classList.add('rec');
      micBtn.textContent = '⏹';
      hint.textContent = 'Loslassen um zu stoppen';
      setStatus('');
      startTimer();
    }

    // ─── Aufnahme stoppen + transkribieren ──────────────────────────────────
    async function stopRec() {
      if (!isRecording) return;
      isRecording = false;
      stopTimer();

      // ★ Zwischenablage JETZT reservieren (Geste vom Loslassen gilt noch!).
      //   Der Text wird per Promise nachgeliefert, sobald Whisper fertig ist.
      //   Klappt das, ist es echtes Auto-Kopieren ohne weiteren Tipp.
      let clipResolve = null, clipReject = null;
      let clipReserved = false;
      if (navigator.clipboard && window.ClipboardItem) {
        try {
          const textPromise = new Promise((res, rej) => { clipResolve = res; clipReject = rej; });
          const blobPromise = textPromise.then(
            (t) => new Blob([t], { type: 'text/plain' })
          );
          navigator.clipboard
            .write([new ClipboardItem({ 'text/plain': blobPromise })])
            .then(() => {
              setStatus('✓ Kopiert! Jetzt in WhatsApp einfügen', 'ok');
              setTimeout(() => setStatus(''), 4000);
            })
            .catch(() => { /* Button bleibt als Fallback */ });
          clipReserved = true;
        } catch { clipReserved = false; }
      }

      // MediaRecorder sauber stoppen
      await new Promise((resolve) => {
        mediaRecorder.onstop = resolve;
        mediaRecorder.stop();
        mediaRecorder.stream.getTracks().forEach(t => t.stop());
      });

      const mimeType = mediaRecorder.mimeType || 'audio/mp4';
      const blob = new Blob(audioChunks, { type: mimeType });

      // Zu kurze Aufnahmen ignorieren
      if (blob.size < 1000) {
        if (clipReject) clipReject();
        reset();
        return;
      }

      // Ladezustand
      isLoading = true;
      micWrap.classList.remove('rec');
      micWrap.classList.add('loading');
      micBtn.textContent = '⏳';
      hint.textContent = 'Transkribiere...';
      resultBox.classList.remove('listening');
      resultBox.classList.add('loading');
      resultBox.placeholder = 'Whisper transkribiert...';
      setStatus('Whisper läuft...', 'info');

      try {
        // Audio → Base64
        const base64 = await new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result.split(',')[1]);
          reader.readAsDataURL(blob);
        });

        const res = await fetch('/api/transcribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ audio: base64, mimeType, lang: 'de' }),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({ error: res.statusText }));
          throw new Error((err.error || res.statusText) + (err.diag ? ' [' + err.diag + ']' : ''));
        }

        const data = await res.json();
        const text = (data.text || '').trim();

        if (text) {
          resultBox.value = text;
          copyBtn.style.display = 'block';
          copyBtn.dataset.text = text;
          addHistory(text);
          // Reservierte Zwischenablage mit dem Text einlösen (= Auto-Kopieren)
          if (clipReserved && clipResolve) {
            clipResolve(text);
          } else {
            // Kein Reservierungs-Weg → Button antippen nötig
            setStatus('Tippe „📋 Text kopieren"', 'info');
          }
        } else {
          if (clipReject) clipReject();
          setStatus('Nichts erkannt — versuch es nochmal.', 'error');
        }

      } catch (e) {
        if (clipReject) clipReject();
        setStatus('Fehler: ' + e.message, 'error');
      } finally {
        reset();
      }
    }

    function reset() {
      isLoading = false;
      micWrap.classList.remove('rec', 'loading');
      micBtn.textContent = '🎤';
      hint.textContent = 'Gedrückt halten zum Aufnehmen';
      resultBox.classList.remove('listening', 'loading');
      resultBox.placeholder = 'Dein Text erscheint hier...';
    }

    // ─── Events ─────────────────────────────────────────────────────────────
    micWrap.addEventListener('touchstart', (e) => { e.preventDefault(); startRec(); }, { passive: false });
    micWrap.addEventListener('touchend',   (e) => { e.preventDefault(); stopRec(); },  { passive: false });
    micWrap.addEventListener('mousedown',  startRec);
    document.addEventListener('mouseup',   () => { if (isRecording) stopRec(); });

    copyBtn.addEventListener('click', () => doCopy(copyBtn.dataset.text || resultBox.value));

    resultBox.addEventListener('focus', () => {
      if (resultBox.value) setTimeout(() => resultBox.setSelectionRange(0, resultBox.value.length), 0);
    });

    // Service Worker entfernen
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations()
        .then(regs => {
          regs.forEach(r => r.unregister());
          if (window.caches) caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
        });
    }
  </script>
</body>
</html>
