<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Wispr" />
  <meta name="theme-color" content="#0f0f0f" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Wispr</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f0f;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: env(safe-area-inset-top, 48px) 24px env(safe-area-inset-bottom, 24px);
      padding-top: max(env(safe-area-inset-top), 48px);
    }

    h1 { font-size: 32px; font-weight: 700; letter-spacing: -1px; margin-bottom: 6px; }

    .subtitle { font-size: 14px; color: #666; margin-bottom: 28px; text-align: center; }

    /* Textfelder */
    .box-wrap { width: 100%; margin-bottom: 10px; }
    .box-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 5px;
      padding-left: 2px;
    }

    textarea.result-area {
      width: 100%;
      min-height: 90px;
      background: #1a1a1a;
      color: #fff;
      border: 2px solid transparent;
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 16px;
      line-height: 1.55;
      font-family: inherit;
      resize: none;
      -webkit-user-select: text;
      user-select: text;
      transition: border-color 0.2s;
    }
    textarea.result-area:focus { outline: none; border-color: #6366f1; }
    #resultBox.listening { border-color: #ef4444; }
    #translationBox { color: #e2e8ff; border-color: #2a2a3a; }
    #translationBox.translating { border-color: #6366f1; animation: glow 1s ease-in-out infinite alternate; }
    @keyframes glow { from { border-color: #3b3e8a; } to { border-color: #6366f1; } }

    /* Kopier-Button */
    #copyBtn {
      width: 100%;
      padding: 15px;
      border-radius: 14px;
      border: none;
      background: #6366f1;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 10px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.2s, transform 0.1s;
      display: none;
    }
    #copyBtn:active { transform: scale(0.97); }
    #copyBtn.done   { background: #16a34a; }

    /* Statuszeile */
    #status {
      font-size: 13px;
      color: #666;
      height: 20px;
      margin-bottom: 8px;
      text-align: center;
    }
    #status.ok    { color: #4ade80; font-weight: 600; }
    #status.error { color: #f87171; }

    /* Mic-Button */
    .mic-wrap {
      position: relative;
      width: 120px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 24px 0 12px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .mic-ring {
      position: absolute;
      width: 120px; height: 120px;
      border-radius: 50%;
      background: #ef4444;
      opacity: 0;
      animation: none;
    }
    .mic-wrap.rec .mic-ring {
      opacity: 0.25;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.25); }
    }

    .mic-btn {
      width: 88px; height: 88px;
      border-radius: 50%;
      background: #6366f1;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      box-shadow: 0 8px 32px rgba(99,102,241,.45);
      transition: background .15s, box-shadow .15s;
      z-index: 1;
    }
    .mic-wrap.rec .mic-btn {
      background: #ef4444;
      box-shadow: 0 8px 32px rgba(239,68,68,.45);
      animation: pulse 1.2s ease-in-out infinite;
    }

    .hint { color: #555; font-size: 13px; text-align: center; margin-bottom: 24px; }

    /* Verlauf */
    #history { width: 100%; flex: 1; overflow: hidden; display: none; flex-direction: column; }
    .hist-title { color: #888; font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
    .hist-list { overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .hist-item {
      background: #1a1a1a; border-radius: 12px; padding: 12px 14px;
      display: flex; align-items: flex-start; justify-content: space-between; gap: 10px;
      cursor: pointer; border: none; width: 100%; text-align: left; color: inherit;
      -webkit-tap-highlight-color: transparent;
    }
    .hist-item .hist-texts { flex: 1; overflow: hidden; }
    .hist-item .hist-de { color: #666; font-size: 12px; overflow: hidden;
      display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; margin-bottom: 3px; }
    .hist-item .hist-tr { color: #ccc; font-size: 14px; overflow: hidden;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .hist-item em { font-style: normal; color: #6366f1; font-size: 12px; font-weight: 600; white-space: nowrap; margin-top: 2px; }

    #unsupported { display: none; color: #f87171; text-align: center; margin-top: 40px; font-size: 15px; line-height: 1.6; }
  </style>
</head>
<body>
  <h1>Wispr</h1>
  <p class="subtitle">Deutsch sprechen → Türkisch kopieren</p>
  <p style="color:#333;font-size:11px;margin-top:-22px;margin-bottom:22px">v8</p>

  <!-- Deutsch -->
  <div class="box-wrap">
    <p class="box-label">🇩🇪 Deutsch</p>
    <textarea id="resultBox" class="result-area" placeholder="Sprich auf Deutsch…" readonly></textarea>
  </div>

  <!-- Türkisch -->
  <div class="box-wrap">
    <p class="box-label">🇹🇷 Türkisch</p>
    <textarea id="translationBox" class="result-area" placeholder="Übersetzung erscheint hier…" readonly></textarea>
  </div>

  <!-- Kopier-Button -->
  <button id="copyBtn">📋 Türkischen Text kopieren</button>

  <!-- Statuszeile -->
  <p id="status"></p>

  <!-- Mic -->
  <div class="mic-wrap" id="micWrap">
    <div class="mic-ring"></div>
    <div class="mic-btn" id="micBtn">🎤</div>
  </div>

  <p class="hint" id="hint">Gedrückt halten zum Aufnehmen</p>

  <div id="unsupported">
    Dein Browser unterstützt keine Spracherkennung.<br>
    Bitte öffne diese Seite in <strong>Safari</strong> auf deinem iPhone.
  </div>

  <div id="history">
    <p class="hist-title">Verlauf</p>
    <div class="hist-list" id="histList"></div>
  </div>


  <script>
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      document.getElementById('unsupported').style.display = 'block';
      document.getElementById('micWrap').style.display = 'none';
    }

    const micWrap       = document.getElementById('micWrap');
    const micBtn        = document.getElementById('micBtn');
    const hint          = document.getElementById('hint');
    const resultBox     = document.getElementById('resultBox');
    const translationBox = document.getElementById('translationBox');
    const copyBtn       = document.getElementById('copyBtn');
    const status        = document.getElementById('status');
    const histEl        = document.getElementById('history');
    const histList      = document.getElementById('histList');

    let recognition = null;
    let isRecording = false;
    let currentText = '';
    let liveText = '';
    const history = [];

    // ─── Kopieren (türkischer Text) ─────────────────────────────────────────
    function doCopy(text, fromBox) {
      if (!text) return false;
      const box = fromBox || translationBox;
      box.value = text;
      box.removeAttribute('readonly');
      box.focus();
      box.setSelectionRange(0, text.length);
      let ok = false;
      try { ok = document.execCommand('copy'); } catch {}
      box.setAttribute('readonly', '');

      if (ok) {
        setStatus('✓ Türkischer Text kopiert! Jetzt in WhatsApp einfügen', 'ok');
        copyBtn.textContent = '✓ Kopiert';
        copyBtn.classList.add('done');
        setTimeout(() => {
          copyBtn.textContent = '📋 Türkischen Text kopieren';
          copyBtn.classList.remove('done');
        }, 3000);
      } else {
        setStatus('Tippe ins türkische Textfeld → "Alles auswählen" → "Kopieren"', 'error');
      }
      return ok;
    }

    function setStatus(msg, cls) {
      status.textContent = msg;
      status.className = cls || '';
      if (cls === 'ok') setTimeout(() => { status.textContent = ''; status.className = ''; }, 4000);
    }

    // ─── Übersetzung ────────────────────────────────────────────────────────
    async function translate(text) {
      translationBox.value = '';
      translationBox.classList.add('translating');
      setStatus('Übersetze ins Türkische…');

      try {
        const url = 'https://api.mymemory.translated.net/get?q='
          + encodeURIComponent(text) + '&langpair=de|tr&de=unur@gmx.at';
        const res = await fetch(url);
        const data = await res.json();
        const tr = data?.responseData?.translatedText;
        if (!tr) throw new Error('Keine Übersetzung');
        translationBox.value = tr;
        translationBox.classList.remove('translating');
        copyBtn.dataset.text = tr;
        copyBtn.style.display = 'block';
        setStatus('');
        // Türkischen Text sofort kopieren
        doCopy(tr, translationBox);
        return tr;
      } catch (err) {
        translationBox.classList.remove('translating');
        setStatus('Übersetzung fehlgeschlagen – Internetverbindung prüfen', 'error');
        return null;
      }
    }

    // ─── Verlauf ────────────────────────────────────────────────────────────
    function addHistory(deText, trText) {
      history.unshift({ de: deText, tr: trText });
      if (history.length > 10) history.pop();
      histList.innerHTML = '';
      history.forEach(item => {
        const b = document.createElement('button');
        b.className = 'hist-item';
        b.innerHTML = `<div class="hist-texts">
          <div class="hist-de">${item.de}</div>
          <div class="hist-tr">${item.tr || '…'}</div>
        </div><em>Kopieren</em>`;
        b.addEventListener('click', () => {
          if (item.tr) {
            translationBox.value = item.tr;
            resultBox.value = item.de;
            copyBtn.dataset.text = item.tr;
            copyBtn.style.display = 'block';
            doCopy(item.tr, translationBox);
          }
        });
        histList.appendChild(b);
      });
      histEl.style.display = 'flex';
    }

    // ─── Aufnahme ───────────────────────────────────────────────────────────
    function startRec() {
      if (isRecording || !SR) return;
      isRecording = true;
      currentText = '';
      liveText = '';
      resultBox.value = '';
      translationBox.value = '';
      resultBox.placeholder = 'Höre zu…';
      resultBox.classList.add('listening');
      copyBtn.style.display = 'none';
      micWrap.classList.add('rec');
      micBtn.textContent = '⏹';
      hint.textContent = 'Loslassen um zu stoppen';
      setStatus('');

      recognition = new SR();
      recognition.lang = 'de-DE';
      recognition.interimResults = true;
      recognition.continuous = true;

      recognition.onresult = (e) => {
        let fin = '', interim = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
          if (e.results[i].isFinal) fin += e.results[i][0].transcript;
          else interim += e.results[i][0].transcript;
        }
        currentText += fin;
        liveText = (currentText + interim).trim();
        if (liveText) resultBox.value = liveText;
      };

      recognition.onerror = (e) => {
        if (e.error !== 'aborted') setStatus('Fehler: ' + e.error, 'error');
        stopRec(false);
      };

      recognition.onend = () => {
        if (isRecording) try { recognition.start(); } catch {}
      };

      recognition.start();
    }

    async function stopRec(save = true) {
      if (!isRecording) return;
      isRecording = false;
      micWrap.classList.remove('rec');
      micBtn.textContent = '🎤';
      hint.textContent = 'Gedrückt halten zum Aufnehmen';
      resultBox.classList.remove('listening');
      resultBox.placeholder = 'Sprich auf Deutsch…';

      if (recognition) {
        recognition.onend = null;
        try { recognition.stop(); } catch {}
        recognition = null;
      }

      if (!save) return;

      const text = liveText || currentText.trim();
      if (text) {
        resultBox.value = text;
        const trText = await translate(text);
        if (trText) addHistory(text, trText);
      }
    }

    // ─── Events ─────────────────────────────────────────────────────────────
    micWrap.addEventListener('touchstart', (e) => { e.preventDefault(); startRec(); }, { passive: false });
    micWrap.addEventListener('touchend',   (e) => { e.preventDefault(); stopRec(); },  { passive: false });
    micWrap.addEventListener('mousedown',  startRec);
    document.addEventListener('mouseup',   () => stopRec());

    copyBtn.addEventListener('click', () => {
      const text = copyBtn.dataset.text || translationBox.value;
      doCopy(text, translationBox);
    });

    translationBox.addEventListener('focus', () => {
      if (translationBox.value) setTimeout(() => translationBox.setSelectionRange(0, translationBox.value.length), 0);
    });

    // Service Worker entfernen (alten Cache aufräumen)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations()
        .then(regs => {
          regs.forEach(r => r.unregister());
          if (window.caches) caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
        });
    }
  </script>
</body>
</html>
